name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Create virtual environment
      run: python -m venv .venv
    
    - name: Install dependencies
      run: |
        .venv/bin/pip install --upgrade pip
        # Install BOTH packages for the monorepo structure
        .venv/bin/pip install -e ".[dev]"
        .venv/bin/pip install -e "./gmos[dev]"
        .venv/bin/pip install pytest-cov
    
    - name: Run legacy tests with coverage
      run: |
        .venv/bin/pytest --cov=core --cov=ledger --cov=runtime --cov=memory --cov=gmos --cov-report=xml --cov-report=term-missing tests/ gmos/tests/
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: gmi-core

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    
    - name: Create virtual environment
      run: python -m venv .venv
    
    - name: Install dependencies
      run: |
        .venv/bin/pip install --upgrade pip
        .venv/bin/pip install ruff black mypy
    
    - name: Run Ruff
      run: |
        .venv/bin/ruff check core/ ledger/ runtime/ memory/ adapters/ gmos/src/
    
    - name: Run Black
      run: |
        .venv/bin/black --check core/ ledger/ runtime/ memory/ adapters/ gmos/src/
    
    - name: Run MyPy
      run: |
        .venv/bin/mypy core/ ledger/ runtime/ memory/ gmos/src/
